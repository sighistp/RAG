services:
  rag-app:
    build: .
    container_name: ragv3
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # 数据持久化（SQLite 数据库 + 上传文件 + Qdrant 向量 + 索引状态）
      - ./data:/app/data
      - ./qdrant_data:/app/qdrant_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
