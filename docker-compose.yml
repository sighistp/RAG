services:
  redis:
    image: redis:7-alpine
    container_name: ragv3-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  rag-app:
    build: .
    container_name: ragv3
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - RAG_REDIS_URL=redis://redis:6379/0
    volumes:
      # 数据持久化（SQLite 数据库 + 上传文件 + Qdrant 向量 + 索引状态）
      - ./data:/app/data
      - ./qdrant_data:/app/qdrant_data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
