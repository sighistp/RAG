name: Deploy to Coze

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Coze
        run: |
          curl -X POST "https://api.coze.cn/v1/workspace/run_pipeline" \
            -H "Authorization: Bearer ${{ secrets.COZE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "workspace_id": "${{ secrets.COZE_PROJECT_ID }}",
              "pipeline_id": 1
            }'
