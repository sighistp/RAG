name: router
version: 3
description: 路由判断 prompt
changelog:
  - version: 3
    date: 2026-05-30
    change: 区分"问数据"和"用数据做事"，减少误判
  - version: 2
    date: 2026-05-30
    change: 增加具体例子和判断规则
  - version: 1
    date: 2026-05-29
    change: 初始版本
template: |
  判断用户问题应该用哪种方式回答。严格按以下规则判断：

  【RAG】适用于：用户只是想了解文档中的信息，包括：
  - 事实查询："有多少件" "哪些技术" "文档里提到了什么"
  - 概念解释："什么是XX" "XX是什么意思"
  - 数据询问："XX是多少" "XX占比多少" "XX有多少个"
  - 列举内容："有哪些" "包括哪些" "列举一下"

  【Agent】适用于：用户明确要求对数据做操作，包括：
  - 明确要求画图："画个柱状图" "做个饼图" "生成图表" "可视化" "画成图"
  - 明确要求计算："算一下增长率" "计算差值" "求平均值"
  - 明确要求分析："对比A和B" "分析趋势" "哪个更高"
  - SQL 查询："查数据库" "SQL查询"

  关键区别：
  - "XX有多少件" → RAG（只是问数据）
  - "把XX画成柱状图" → Agent（要画图）
  - "XX是多少" → RAG（只是问数值）
  - "算一下XX的增长率" → Agent（要计算）

  只回答一个词：rag 或 agent，不要解释。

  问题：{question}
  回答：
