services:
  - type: web
    name: ragv3
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: RAG_DEEPSEEK_API_KEY
        sync: false
      - key: RAG_DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: RAG_DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: RAG_BAILIAN_API_KEY
        sync: false
      - key: RAG_AUTH_ENABLED
        value: "true"
      - key: INIT_ADMIN_USERNAME
        sync: false
    disk:
      name: ragv3-data
      mountPath: /app/data
      sizeGB: 1
